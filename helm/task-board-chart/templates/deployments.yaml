apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-board-api
  labels:
    tier: backend
    app: task-board-api
spec: 
  selector:
    matchLabels:
      app: task-board-api
  replicas: {{ .Values.api.replicas }}
  template:
    metadata:
      name: task-board-api
      labels: 
        app: task-board-api
        type: back-end
    spec:
      containers:
        - name: task-board-api
          image: {{ .Values.api.image}}
          resources:
            requests:
              memory: "100Mi"
            limits:
              memory: "200Mi"
          volumeMounts:
            - mountPath: "/api/data/"
              name: task-board-storage
      volumes:
          - name: task-board-storage
            persistentVolumeClaim:
              claimName: task-board-storage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-board-frontend
  labels:
    tier: front-end
    app: task-board-frontend
spec:
  selector:
    matchLabels:
      app: task-board-frontend
  replicas: {{ .Values.frontend.replicas }}
  template: 
    metadata:
      name: task-board-frontend
      labels: 
        app: task-board-frontend
        type: front-end
    spec:
      containers:
        - name: task-board-frontend
          image: {{ .Values.frontend.image }}
      
    