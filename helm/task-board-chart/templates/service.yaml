apiVersion: v1
kind: Service
metadata:
  name: task-board-service
spec:
    type: NodePort
    ports: 
      - targetPort: {{ .Values.api.targetPort }}
        port: {{ .Values.api.port }}
        nodePort: {{ .Values.api.nodePort }}
    selector:
        app: task-board-api
        type: back-end

---
apiVersion: v1
kind: Service
metadata:
  name: task-board-frontend-service
spec:
  type: NodePort 
  ports:
    - targetPort: {{ .Values.frontend.targetPort }}
      port: {{ .Values.frontend.port }}
      nodePort: {{ .Values.frontend.nodePort }}
  selector:
      app: task-board-frontend
      type: front-end