# This is a virtual server block — nginx can host multiple, we only need one.
server {
    # Listen on port 80 inside the container (the default HTTP port).
    listen 80;

    # Any request that doesn't match a more specific location block lands here.
    location / {
        # Where the built frontend files live (Vite's output copied here in Dockerfile).
        root /usr/share/nginx/html;
        # If someone hits "/", serve index.html by default.
        index index.html;
        # Try the exact file first ($uri), then as a directory ($uri/),
        # and if nothing matches, serve index.html (needed for SPA client-side routing).
        try_files $uri $uri/ /index.html;
    }

    # Any request starting with /api/ gets caught here instead of the block above.
    location /api/ {
        # Forward the request to the API Service INSIDE the cluster.
        # "task-board-service" is the K8s Service name — CoreDNS resolves it to the Service IP.
        # :3001 is the targetPort where Express is actually listening.
        proxy_pass http://task-board-service:3001;
    }
}
